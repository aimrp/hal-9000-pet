<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0; height: 100%; overflow: hidden; background: transparent;
      font-family: "Segoe UI", system-ui, sans-serif; color: #e9dfd9;
      -webkit-user-select: none; user-select: none;
    }
    .wrap { display: inline-block; }
    .card {
      box-sizing: border-box;
      background: linear-gradient(180deg, #201b16 0%, #141110 100%);
      border: 1px solid rgba(255,120,60,0.5); border-radius: 14px;
      padding: 11px 16px 12px;
    }
    .title { font-size: 12.5px; font-weight: 600; color: #ffcf99; }
    .rule { height: 1px; background: rgba(255,255,255,0.08); margin: 7px 0 10px; }
    .grid { display: grid; grid-template-columns: auto auto; row-gap: 10px; column-gap: 24px; }
    .cell { display: flex; align-items: baseline; gap: 8px; }
    .cell .l { font-size: 10.5px; color: #8a807b; min-width: 30px; }
    .cell .v { font-size: 15.5px; font-weight: 600; color: #f2e7e0; font-variant-numeric: tabular-nums; }
    /* downward tail so it reads like a speech bubble pointing at HAL (centered) */
    .tail { width: 0; height: 0; margin: -1px auto 0;
      border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 9px solid #16130f; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">📊 今日战绩</div>
      <div class="rule"></div>
      <div class="grid" id="grid"></div>
    </div>
    <div class="tail"></div>
  </div>
  <script src="stats.js"></script>
</body>
</html>
