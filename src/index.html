<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      -webkit-user-select: none;
      user-select: none;
    }
    /* Clicking is the primary action (double-click opens Claude), so the hover
       cursor is a pointer; JS swaps it to "grabbing" only once a real drag starts. */
    #stage {
      width: 100vw;
      height: 100vh;
      cursor: pointer;
    }
    #pet {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="pet"></canvas>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
